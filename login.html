<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-800 rounded-lg p-6 shadow-2xl max-w-sm w-full">
      <h2 class="text-center text-2xl text-gray-300 font-bold mb-4">Login</h2>
      <form action="" method="post">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Email</label
          >
          <input
            class="w-full bg-gray-600 rounded-md px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            type="email"
            placeholder="Email"
            name=""
            id=""
          />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Password</label
          >
          <input
            class="w-full bg-gray-600 rounded-md px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            type="password"
            placeholder="password"
            name=""
            id=""
          />
        </div>

        <button
          class="bg-blue-500 w-full rounded-md py-2 text-white font-bold hover:bg-blue-700 shadow-2xl"
          type="submit"
        >
          Login
        </button>
      </form>
    </div>
  </body>
</html>
