<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grocify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      class="min-h-screen bg-gray-900 bg-center bg-cover px-28 py-5 relative"
    >
      <nav class="flex items-center">
        <img src="images/logo.png" alt="" class="w-40 cursor-pointer" />
        <ul class="flex-1 text-center">
          <li class="list-none inline-block px-5">
            <a href="#" class="text-white no-underline px-2">Home</a>
          </li>
          <li class="list-none inline-block px-5">
            <a href="#" class="text-white no-underline px-2">Shop</a>
          </li>
          <li class="list-none inline-block px-5">
            <a href="#" class="text-white no-underline px-2">About Us</a>
          </li>
          <li class="list-none inline-block px-5">
            <a href="#" class="text-white no-underline px-2">Contact</a>
          </li>
        </ul>
        <img src="images/cart.png" alt="" class="w-8 cursor-pointer" />
      </nav>
      <div class="mt-20 max-w-xl">
        <h1 class="text-5xl text-white font-bold mt-20">
          Fresh Groceries Delivered to Your Doorstep
        </h1>
        <p class="text-gray-300 text-lg mt-4">
          Experience the convenience of online grocery shopping with us. We
          offer a wide selection of fresh produce, pantry staples, and household
          essentials, all delivered right to your doorstep.
        </p>
        <button
          class="bg-green-500 text-white font-bold shadow-2xl cursor-pointer px-6 py-3 rounded-full mt-6 hover:bg-green-700 transition duration-300"
        >
          Shop Now
        </button>
        <button
          class="bg-yellow-500 text-white font-bold shadow-2xl cursor-pointer px-6 py-3 rounded-full mt-6 hover:bg-yellow-700 transition duration-300"
        >
          Download App
          <span class="ml-1 font-bold inline-block rotate-90">&#10148;</span>
        </button>
      </div>
      <div>
        <img
          src="images/grocery-image.png"
          alt=""
          class="w-full xl:w-1/2 xl:absolute bottom-0 right-20"
        />
      </div>
    </div>
  </body>
</html>
